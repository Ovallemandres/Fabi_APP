<section class="mx-auto max-w-xl space-y-6">
  {% url 'catalog:supply_list' as supply_list %}
  {% include "components/page_header.html" with title=title back_href=supply_list back_label="← Suministros" %}

  <div class="rounded-2xl bg-surface px-5 py-5 shadow-neo">
    <form method="post" action="{% if supply %}{% url 'catalog:supply_update' supply.pk %}{% else %}{% url 'catalog:supply_create' %}{% endif %}">
      {% csrf_token %}
      {% include "components/form_fields.html" %}
      {% include "components/form_actions.html" with cancel_href=supply_list %}
    </form>
  </div>
</section>
