<table>
  <thead><tr><th>Número</th><th>Presupuesto</th><th>Estado</th><th>Total VES</th><th>A pagar</th><th></th></tr></thead>
  <tbody>
    {% for invoice in invoices %}
      <tr>
        <td><a href="{% url 'billing:invoice_detail' invoice.pk %}">{{ invoice.number }}</a></td>
        <td>{{ invoice.quote.number }}</td>
        <td>{{ invoice.get_status_display }}</td>
        <td>{{ invoice.total_ves }}</td>
        <td>{{ invoice.total_a_pagar_ves }}</td>
        <td><a href="{% url 'billing:invoice_detail' invoice.pk %}">Ver</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="6">Sin facturas.</td></tr>
    {% endfor %}
  </tbody>
</table>
