<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    {% if back_href %}
      <a href="{{ back_href }}" class="text-sm text-muted transition-all duration-300 ease-in-out hover:text-brand">{{ back_label|default:"← Volver" }}</a>
    {% endif %}
    <h1 class="{% if back_href %}mt-2 {% endif %}text-2xl font-bold text-ink sm:text-3xl">{{ title }}</h1>
    {% if subtitle %}
      <p class="mt-1 text-sm text-muted">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% if action_href and action_label %}
    <a
      href="{{ action_href }}"
      class="rounded-full bg-brand px-4 py-2 text-sm font-medium text-surface shadow-neo-sm transition-all duration-300 ease-in-out hover:opacity-90 active:shadow-neo-pressed"
    >{{ action_label }}</a>
  {% endif %}
</div>
