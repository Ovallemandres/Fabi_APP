<button
  type="{{ type|default:'submit' }}"
  class="rounded-full bg-brand px-4 py-2 text-sm font-medium text-surface shadow-neo-sm transition-all duration-300 ease-in-out hover:opacity-90 active:shadow-neo-pressed {% if full %}w-full py-3{% endif %}"
  {% if name %}name="{{ name }}"{% endif %}
  {% if value %}value="{{ value }}"{% endif %}
>
  {{ label }}
</button>
