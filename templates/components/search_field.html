<div class="relative mb-4 max-w-md">
  <label class="mb-1.5 block text-sm font-medium text-ink" for="{{ input_id|default:'search-q' }}">
    {{ label|default:"Buscar" }}
  </label>
  <input
    type="search"
    name="{{ name|default:'q' }}"
    id="{{ input_id|default:'search-q' }}"
    value="{{ value }}"
    placeholder="{{ placeholder|default:'' }}"
    class="w-full rounded-2xl border-0 bg-surface px-4 py-2.5 text-sm text-ink shadow-neo-inset outline-none transition-all duration-300 ease-in-out focus:ring-2 focus:ring-brand"
  >
  <div id="{{ indicator_id|default:'search-indicator' }}" class="htmx-indicator mt-3 space-y-2">
    <div class="h-3 w-full animate-pulse rounded-full bg-shadow-dark/40 shadow-neo-inset"></div>
    <div class="h-3 w-4/5 animate-pulse rounded-full bg-shadow-dark/40 shadow-neo-inset"></div>
    <div class="h-3 w-3/5 animate-pulse rounded-full bg-shadow-dark/40 shadow-neo-inset"></div>
  </div>
</div>
