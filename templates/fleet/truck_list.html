{% extends "base.html" %}
{% block title %}Camiones — {{ block.super }}{% endblock %}
{% block content %}
  <h1>Camiones</h1>
  <p><a href="{% url 'fleet:truck_create' %}">Nuevo camión</a></p>
  <form method="get" action="{% url 'fleet:truck_list' %}"
        hx-get="{% url 'fleet:truck_list' %}"
        hx-target="#truck-table"
        hx-trigger="keyup changed delay:300ms from:input[name=q], submit">
    <label>Buscar <input type="search" name="q" value="{{ q }}"></label>
  </form>
  <div id="truck-table">
    {% include "fleet/partials/truck_table.html" %}
  </div>
{% endblock %}
