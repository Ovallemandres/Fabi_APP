{% extends "base.html" %}
{% block title %}Propietarios — {{ block.super }}{% endblock %}
{% block content %}
  <h1>Propietarios</h1>
  <p><a href="{% url 'fleet:owner_create' %}">Nuevo propietario</a></p>
  <form method="get" action="{% url 'fleet:owner_list' %}"
        hx-get="{% url 'fleet:owner_list' %}"
        hx-target="#owner-table"
        hx-trigger="keyup changed delay:300ms from:input[name=q], submit">
    <label>Buscar <input type="search" name="q" value="{{ q }}"></label>
  </form>
  <div id="owner-table">
    {% include "fleet/partials/owner_table.html" %}
  </div>
{% endblock %}
