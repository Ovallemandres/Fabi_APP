<section>
  <h1>{{ title }}</h1>
  <form method="post"
        {% if driver %}action="{% url 'fleet:driver_update' driver.pk %}"{% else %}action="{% url 'fleet:driver_create' %}"{% endif %}>
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Guardar</button>
    <a href="{% url 'fleet:driver_list' %}">Cancelar</a>
  </form>
</section>
