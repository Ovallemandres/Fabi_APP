<table>
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Documento</th>
      <th>Teléfono</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for driver in drivers %}
      <tr>
        <td>{{ driver.full_name }}</td>
        <td>{{ driver.id_document }}</td>
        <td>{{ driver.phone }}</td>
        <td>
          <a href="{% url 'fleet:driver_update' driver.pk %}">Editar</a>
          <form method="post" action="{% url 'fleet:driver_delete' driver.pk %}">
            {% csrf_token %}
            <button type="submit">Eliminar</button>
          </form>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="4">Sin conductores.</td></tr>
    {% endfor %}
  </tbody>
</table>
