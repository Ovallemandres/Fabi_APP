{% extends "base.html" %}
{% block title %}Conductores — {{ block.super }}{% endblock %}
{% block content %}
  <h1>Conductores</h1>
  <p><a href="{% url 'fleet:driver_create' %}">Nuevo conductor</a></p>
  <form method="get" action="{% url 'fleet:driver_list' %}"
        hx-get="{% url 'fleet:driver_list' %}"
        hx-target="#driver-table"
        hx-trigger="keyup changed delay:300ms from:input[name=q], submit">
    <label>Buscar <input type="search" name="q" value="{{ q }}"></label>
  </form>
  <div id="driver-table">
    {% include "fleet/partials/driver_table.html" %}
  </div>
{% endblock %}
