<table>
  <thead><tr><th>Tipo</th><th>Año</th><th>Prefijo</th><th>Padding</th><th>Siguiente</th><th></th></tr></thead>
  <tbody>
    {% for sequence in sequences %}
      <tr>
        <td>{{ sequence.get_document_kind_display }}</td>
        <td>{{ sequence.year }}</td>
        <td>{{ sequence.prefix }}</td>
        <td>{{ sequence.padding }}</td>
        <td>{{ sequence.next_number }}</td>
        <td><a href="{% url 'core:sequence_update' sequence.pk %}">Editar</a></td>
      </tr>
    {% empty %}
      <tr><td colspan="6">Aún no hay secuencias (se crean al emitir el primer documento).</td></tr>
    {% endfor %}
  </tbody>
</table>
